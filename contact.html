  <!-- ===== MAIN CONTENT ===== -->
  <section class="contact-main">
    <div class="contact-left">
      <h1>Let's Chat</h1>
      <p class="contact-subtitle">Book a free 30 min intro call – let's chat so I can learn more about where you are now and where you want to go!</p>

      <!-- Replace YOUR_FORM_ID with your Formspree endpoint -->
      <form class="contact-form" action="https://formspree.io/f/mbdperbg" method="POST">

        <div class="form-group">
          <label class="form-label">Name</label>
          <div class="form-row">
            <div class="form-group">
              <input type="text" name="first_name" class="form-input" placeholder="First Name" required>
              <span class="form-required">(required)</span>
            </div>
            <div class="form-group">
              <input type="text" name="last_name" class="form-input" placeholder="Last Name" required>
              <span class="form-required">(required)</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email <span class="form-required">(required)</span></label>
          <input type="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" name="phone" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea name="message" class="form-textarea" rows="4"></textarea>
        </div>

        <button type="submit" class="btn-dark">Send Request</button>
      </form>

    </div>

    <div class="contact-right">
      <img src="jen image 3.webp" alt="Person working on laptop">
    </div>
  </section>
